services:
  broker:
    profiles:
      - secure-local
    ports:
      - "9093:9093"
    volumes:
      - ../../../examples/security/local-sasl-ssl/certs:/etc/kafka/secrets
      - ../../../examples/security/local-sasl-ssl/server_jaas.conf:/etc/kafka/secrets/server_jaas.conf:ro
    environment:
      KAFKA_LISTENERS: SASL_SSL://broker:29093,SASL_SSL_HOST://0.0.0.0:9093,CONTROLLER://broker:29094
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://broker:29093,SASL_SSL_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_SSL:SASL_SSL,SASL_SSL_HOST:SASL_SSL,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29094
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_SSL
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/broker.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: changeit
      KAFKA_SSL_KEY_PASSWORD: changeit
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/broker.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_SUPER_USERS: User:broker;User:admin
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/secrets/server_jaas.conf

  schema-registry:
    profiles:
      - secure-local
    volumes:
      - ../../../examples/security/local-sasl-ssl/certs:/etc/kafka/secrets
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SASL_SSL://broker:29093
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_SSL
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/client.truststore.jks
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD: changeit

  connect:
    profiles:
      - secure-local
    volumes:
      - ../../../examples/security/local-sasl-ssl/certs:/etc/kafka/secrets
    environment:
      CONNECT_BOOTSTRAP_SERVERS: broker:29093
      CONNECT_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_SASL_MECHANISM: PLAIN
      CONNECT_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
      CONNECT_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/client.truststore.jks
      CONNECT_SSL_TRUSTSTORE_PASSWORD: changeit
      CONNECT_PRODUCER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_PRODUCER_SASL_MECHANISM: PLAIN
      CONNECT_PRODUCER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
      CONNECT_PRODUCER_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/client.truststore.jks
      CONNECT_PRODUCER_SSL_TRUSTSTORE_PASSWORD: changeit
      CONNECT_CONSUMER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_CONSUMER_SASL_MECHANISM: PLAIN
      CONNECT_CONSUMER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
      CONNECT_CONSUMER_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/client.truststore.jks
      CONNECT_CONSUMER_SSL_TRUSTSTORE_PASSWORD: changeit
      CONNECT_ADMIN_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_ADMIN_SASL_MECHANISM: PLAIN
      CONNECT_ADMIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
      CONNECT_ADMIN_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/client.truststore.jks
      CONNECT_ADMIN_SSL_TRUSTSTORE_PASSWORD: changeit

  ksqldb-server:
    profiles:
      - secure-local
    volumes:
      - ../../../examples/security/local-sasl-ssl/certs:/etc/kafka/secrets
    environment:
      KSQL_BOOTSTRAP_SERVERS: broker:29093
      KSQL_SECURITY_PROTOCOL: SASL_SSL
      KSQL_SASL_MECHANISM: PLAIN
      KSQL_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
      KSQL_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/client.truststore.jks
      KSQL_SSL_TRUSTSTORE_PASSWORD: changeit

  ksqldb-cli:
    profiles:
      - secure-local